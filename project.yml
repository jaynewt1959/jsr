name: JSR

options:
  bundleIdPrefix: com.jamien
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug

packages:
  hummingbird:
    url: https://github.com/hummingbird-project/hummingbird.git
    from: "2.0.0"
  hummingbird-websocket:
    url: https://github.com/hummingbird-project/hummingbird-websocket.git
    from: "2.0.0"

schemes:
  JSR:
    build:
      targets:
        JSR: all
    run:
      config: Debug
    archive:
      config: Release

targets:
  JSR:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    info:
      path: JSR/Info.plist
      properties:
        CFBundleDisplayName: JSR
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSRequiresIPhoneOS: true
        UIRequiresFullScreen: true
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: LaunchIcon
        UIUserInterfaceStyle: Dark
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        ITSAppUsesNonExemptEncryption: false

    settings:
      base:
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "2"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.jamien.JSR
        PRODUCT_NAME: JSR
        ENABLE_HARDENED_RUNTIME: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 2U6V9ARN9F
        ENABLE_USER_SCRIPT_SANDBOXING: NO

    sources:
      - path: JSR
      - path: Sources/Server
      - path: Sources/MIDI
      - path: Assets.xcassets

    dependencies:
      - package: hummingbird
        product: Hummingbird
      - package: hummingbird-websocket
        product: HummingbirdWebSocket

    preBuildScripts:
      - name: "Build Web UI"
        script: |
          set -e
          cd "$SRCROOT/web"
          npm install --silent
          VITE_APP_CONFIG="$CONFIGURATION" npm run build

    postBuildScripts:
      - name: "Copy Web UI to Bundle"
        script: |
          set -e
          DEST="$BUILT_PRODUCTS_DIR/$CONTENTS_FOLDER_PATH/dist"
          rm -rf "$DEST"
          cp -r "$SRCROOT/web/dist" "$DEST"
